experiments:
  - question_id: D1
    suite: classification
    manipulated_variable:
      axis: q-in
      levels:
        - prose
        - markdown
        - xml
      notes: Input task content is rendered in the selected wrapper; output instruction is fixed.
    models:
      - gpt-5.5
      - gpt-5.4
      - claude-opus-4-8
      - claude-sonnet-4-6
      - claude-haiku-4-5
      - qwen2.5:7b-instruct-q4_K_M
    metrics:
      - accuracy
      - token_input
      - cost_usd
    repetition:
      seeds_or_repeated_calls: 3
      temperature_policy: seed_when_supported_else_repeated_calls
    fixed_confounders:
      - format_separator_casing_spacing_constant
      - classification_option_order_rotated
      - output_format_fixed
      - task_content_fixed_across_formats
    hypothesis:
      expected: Spread across frontier models is <=2 percentage points.
      falsification_threshold: Falsified if any frontier model has max-min accuracy spread >2pp across prose/markdown/xml.

  - question_id: D2
    suite: classification
    manipulated_variable:
      axis: q-in
      levels:
        - plain
        - markdown
        - xml
        - json
        - yaml
      dimensions:
        - instruction_heavy
        - multi_section
      notes: Instruction-heavy multi-section classification prompts over all non-tabular formats; XML vs Markdown on Claude is analyzed as a subset.
    models:
      - gpt-5.5
      - gpt-5.4
      - claude-opus-4-8
      - claude-sonnet-4-6
      - claude-haiku-4-5
      - qwen2.5:7b-instruct-q4_K_M
    metrics:
      - accuracy
      - token_input
      - cost_usd
    repetition:
      seeds_or_repeated_calls: 3
      temperature_policy: seed_when_supported_else_repeated_calls
    fixed_confounders:
      - format_separator_casing_spacing_constant
      - classification_option_order_rotated
      - output_format_fixed
      - task_content_fixed_across_formats
    hypothesis:
      expected: XML is competitive with Markdown on Claude within the broader all-format comparison.
      falsification_threshold: Falsified if Markdown exceeds XML by >1pp on Claude aggregate accuracy while other formats do not explain the spread.

  - question_id: D11
    suite: long_context
    manipulated_variable:
      axis: instruction_position
      levels:
        - head
        - tail
        - both
      notes: Data wrapping is fixed; only instruction placement changes.
    models:
      - gpt-5.5
      - gpt-5.4
      - claude-opus-4-8
      - claude-sonnet-4-6
      - claude-haiku-4-5
      - qwen2.5:7b-instruct-q4_K_M
    metrics:
      - accuracy_citation_fidelity
      - token_input
      - cost_usd
    repetition:
      seeds_or_repeated_calls: 3
      temperature_policy: seed_when_supported_else_repeated_calls
    fixed_confounders:
      - format_separator_casing_spacing_constant
      - output_format_fixed
      - task_content_fixed_across_formats
      - long_context_needle_position_fixed_for_instruction_position
    hypothesis:
      expected: Tail instruction placement is greater than or equal to head placement.
      falsification_threshold: Falsified if head exceeds tail by >2pp accuracy/citation-fidelity.

  - question_id: D3
    suite: extraction
    manipulated_variable:
      axis: q-out
      levels:
        - structured_native
        - prompt_only_json
      effort_levels:
        - low
        - medium
        - high
      notes: Input representation is fixed; output constraint mechanism is crossed with reasoning effort.
    models:
      - gpt-5.5
      - gpt-5.4
      - claude-opus-4-8
      - claude-sonnet-4-6
      - claude-haiku-4-5
    metrics:
      - schema_compliance
      - field_f1
      - token_output
      - cost_usd
    repetition:
      seeds_or_repeated_calls: 3
      temperature_policy: seed_when_supported_else_repeated_calls
    fixed_confounders:
      - format_separator_casing_spacing_constant
      - input_format_fixed
      - task_content_fixed_across_output_modes
    hypothesis:
      expected: Native structured output reaches >=99% compliance while prompt-only JSON is 85-95%.
      falsification_threshold: Falsified if native compliance <99% or prompt-only compliance >98% with no native advantage.

  - question_id: D4
    suite: reasoning
    manipulated_variable:
      axis: q-out
      levels:
        - json_strict_direct
        - reason_then_convert
      effort_levels:
        - low
        - medium
        - high
      notes: Reasoning input is fixed; answer production protocol is crossed with reasoning effort.
    models:
      - gpt-5.5
      - gpt-5.4
      - claude-opus-4-8
      - claude-sonnet-4-6
      - claude-haiku-4-5
      - qwen2.5:7b-instruct-q4_K_M
    metrics:
      - accuracy_final_answer
      - schema_compliance
      - token_output
      - cost_usd
    repetition:
      seeds_or_repeated_calls: 3
      temperature_policy: seed_when_supported_else_repeated_calls
    fixed_confounders:
      - format_separator_casing_spacing_constant
      - input_format_fixed
      - task_content_fixed_across_output_modes
    hypothesis:
      expected: Reason-then-convert improves final-answer accuracy by at least 5pp over direct strict JSON.
      falsification_threshold: Falsified if reason-then-convert advantage is <5pp.

  - question_id: D5
    suite: nested_data
    manipulated_variable:
      axis: q-in
      levels:
        - plain
        - markdown
        - xml
        - json
        - yaml
      notes: Same nested canonical record, different input renderers.
    models:
      - gpt-5.5
      - gpt-5.4
      - claude-opus-4-8
      - claude-sonnet-4-6
      - claude-haiku-4-5
      - qwen2.5:7b-instruct-q4_K_M
    metrics:
      - accuracy_token
      - token_input
      - cost_usd
    repetition:
      seeds_or_repeated_calls: 3
      temperature_policy: seed_when_supported_else_repeated_calls
    fixed_confounders:
      - format_separator_casing_spacing_constant
      - output_format_fixed
      - task_content_fixed_across_formats
    hypothesis:
      expected: YAML and Markdown are greater than or equal to JSON and XML on nested-data accuracy.
      falsification_threshold: Falsified if max(yaml, markdown) is < max(json, xml) by >2pp.

  - question_id: D6
    suite: find_replace
    manipulated_variable:
      axis: q-out
      levels:
        - markdown
        - xml
        - json
        - yaml
        - plain
      notes: Code/input task is fixed; requested patch/output envelope varies. JSON uses native strict structured output where a schema is available; all other formats are requested by text instruction.
    models:
      - gpt-5.5
      - gpt-5.4
      - claude-opus-4-8
      - claude-sonnet-4-6
      - claude-haiku-4-5
      - qwen2.5:7b-instruct-q4_K_M
    metrics:
      - pass_at_1
      - token_output
      - cost_usd
    repetition:
      seeds_or_repeated_calls: 3
      temperature_policy: seed_when_supported_else_repeated_calls
    fixed_confounders:
      - format_separator_casing_spacing_constant
      - input_format_fixed
      - task_content_fixed_across_output_modes
    hypothesis:
      expected: XML is last and at least 10pp below the best output mode.
      falsification_threshold: Falsified if XML is not last or is <10pp below the best pass@1 rate.

  - question_id: D7tab
    suite: tabular
    manipulated_variable:
      axis: q-in
      levels:
        - plain
        - markdown_table
        - xml
        - json_records
        - yaml
        - csv
        - toon
      dimensions:
        - rows_50
        - rows_500
        - rows_2000
        - rows_5000
      notes: Table row-count curve over compact and verbose formats.
    models:
      - gpt-5.5
      - gpt-5.4
      - claude-opus-4-8
      - claude-sonnet-4-6
      - claude-haiku-4-5
      - qwen2.5:7b-instruct-q4_K_M
    metrics:
      - accuracy_token
      - token_input
      - cost_usd
    repetition:
      seeds_or_repeated_calls: 3
      temperature_policy: seed_when_supported_else_repeated_calls
    fixed_confounders:
      - format_separator_casing_spacing_constant
      - output_format_fixed
      - task_content_fixed_across_formats
    hypothesis:
      expected: Compact formats win below context-pressure threshold; verbose formats degrade less above threshold.
      falsification_threshold: Falsified if no row-count-dependent crossover or slope difference is observed.

  - question_id: D8
    suite: multi_agent
    manipulated_variable:
      axis: state_serialization
      levels:
        - json
        - markdown
        - yaml
        - xml
        - plain
        - compact_pseudocode
      notes: Protocol labels this Q-IN+OUT; benchmark keeps output protocol fixed and varies serialized agent state only.
    models:
      - gpt-5.5
      - gpt-5.4
      - claude-opus-4-8
      - claude-sonnet-4-6
      - claude-haiku-4-5
      - qwen2.5:7b-instruct-q4_K_M
    metrics:
      - success_rate
      - token_input
      - success_rate_total_input_tokens
      - cost_usd
    repetition:
      seeds_or_repeated_calls: 3
      temperature_policy: seed_when_supported_else_repeated_calls
    fixed_confounders:
      - format_separator_casing_spacing_constant
      - multi_agent_output_protocol_fixed
      - fixed_simple_orchestrator
      - task_content_fixed_across_formats
    hypothesis:
      expected: Compact state serialization reduces input tokens by 40% without losing more than 3pp success rate.
      falsification_threshold: Falsified if token reduction <40% or success-rate loss >3pp.

  - question_id: D9
    suite: long_context
    manipulated_variable:
      axis: q-in
      levels:
        - xml_document
        - json_array
        - markdown
        - yaml
        - plain
      notes: Long-context wrapping only; instructions and answer constraints fixed.
    models:
      - gpt-5.5
      - gpt-5.4
      - claude-opus-4-8
      - claude-sonnet-4-6
      - claude-haiku-4-5
      - qwen2.5:7b-instruct-q4_K_M
    metrics:
      - accuracy_citation_fidelity
      - token_input
      - cost_usd
    repetition:
      seeds_or_repeated_calls: 3
      temperature_policy: seed_when_supported_else_repeated_calls
    fixed_confounders:
      - format_separator_casing_spacing_constant
      - output_format_fixed
      - task_content_fixed_across_formats
      - long_context_needle_position_randomized
    hypothesis:
      expected: XML document wrapping is at least 7pp better than JSON array wrapping.
      falsification_threshold: Falsified if XML advantage is <7pp.

  - question_id: D10
    suite: transversal
    manipulated_variable:
      axis: cost_probe
      levels:
        - json_strict
        - markdown
        - yaml
        - xml
        - plain
      notes: Cross-suite Q-OUT cost probe comparing JSON strict native with text-instructed Markdown, YAML, XML, and plain outputs at equal information content.
    models:
      - gpt-5.5
      - gpt-5.4
      - claude-opus-4-8
      - claude-sonnet-4-6
      - claude-haiku-4-5
      - qwen2.5:7b-instruct-q4_K_M
    metrics:
      - token_input
      - token_output
      - token_ratio_output_input
      - cost_usd
    repetition:
      seeds_or_repeated_calls: 3
      temperature_policy: repeat_calls
    fixed_confounders:
      - format_separator_casing_spacing_constant
      - input_format_fixed
      - output_information_fixed
      - task_content_fixed_across_output_modes
    hypothesis:
      expected: Output tokens cost at least 4x input tokens on closed models; XML output is most expensive, YAML/plain among the cheapest.
      falsification_threshold: Falsified if median closed-model output/input price ratio is <4 or XML is not among the highest token-cost output formats.
